name: Security

on:
  schedule:
    - cron: "0 1 * * *"

jobs:
  scan:
    name: Scan for known vulnerabilities
    runs-on: ubuntu-latest
    env:
      TRIVY_RESULTS: 'trivy-results.sarif'
      RELEASE_SCAN: 'release-scan'
    steps:
      - name: Download and extract latest release
        run: |
          gh release download --repo ${{ github.repository }} --pattern '*linux_amd64.tar.gz'
          mkdir ${RELEASE_SCAN}
          tar xvf chisel*amd64.tar.gz -C ${RELEASE_SCAN}

      - name: Run Trivy vulnerability scanner on release
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'rootfs'
          scan-ref: "./${{ env.RELEASE_SCAN }}/chisel"
          format: 'sarif'
          output: ${{ env.TRIVY_RESULTS }}
          # TODO: Replace with the fine grained token once created.
          github-pat: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          sarif_file: ${{ env.TRIVY_RESULTS }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.TRIVY_RESULTS }}
          path: ${{ env.TRIVY_RESULTS }}

      - name: Raise error on HIGH,CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'rootfs'
          scan-ref: "./${{ env.RELEASE_SCAN }}/chisel"
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
