version: "2"
linters:
  default: none
  enable:
    - errcheck
    - staticcheck
    - unused
  exclusions:
    presets:
      - comments
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: ^.*/log.go$
        text: globalLogger.Output.*not checked
      - linters:
          - errcheck
        path: ^.*_test.go$
        text: release.Render.*not checked
      - linters:
          - errcheck
        path: ^.*_test.go$
        text: release.Walk.*not checked
      - linters:
          - errcheck
        path: internal/setup/fetch.go
        text: lockFile.Unlock.*not checked
      - linters:
          - unused
        path: cmd/chisel/main.go
        text: addDebugCommand.*unused
      - linters:
          - unused
        path: ^.*/log.go$
        text: logf.*unused
      - linters:
          - unused
        path: ^.*/log.go$
        text: debugf.*unused
      - linters:
          - unused
        path: ^.*/log.go$
        text: globalDebug.*unused
      - linters:
          - unused
        path: ^.*/log.go$
        text: globalLogger.*unused
      - linters:
          - staticcheck
        path: ^.*.go$
        text: '"golang.org/x/crypto/openpgp/\w+" is deprecated'
      - linters:
          - staticcheck
        path: cmd/chisel/.*.go
        text: "ST1005:"
  settings:
    staticcheck:
      checks:
        - all
        # Checks now detecting new issues after migrating to golangci-lint v2.
        # TODO: Remove these and solve raised issues.
        - -ST1012
        - -ST1003
        - -QF1009
        - -QF1011
        - -QF1012
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
